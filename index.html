<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Barcode Generator</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --ink: #e7e9ee;
    --muted: #9aa3b2;
    --accent: #4f9dff;
    --accent-2: #2f7be0;
    --line: #2a2f3a;
    --ok: #35c46a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2130, var(--bg));
    color: var(--ink);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 64px;
  }
  h1 {
    font-size: 20px;
    font-weight: 650;
    letter-spacing: .2px;
    margin: 0 0 4px;
  }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

  .card {
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
  }

  /* The scannable label — white so a scanner/camera reads clean bars */
  .label {
    background: #ffffff;
    border-radius: 10px;
    padding: 22px 18px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .label svg { width: 100%; height: 110px; display: block; }
  .code {
    font-family: ui-monospace, "SFMono-Regular", "Consolas", monospace;
    font-size: 26px;
    letter-spacing: 6px;
    color: #111;
    padding-left: 6px; /* balance the letter-spacing */
  }

  .controls {
    margin-top: 22px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  button {
    flex: 1 1 auto;
    min-width: 120px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--ink);
    padding: 11px 14px;
    border-radius: 10px;
    font: inherit;
    font-weight: 550;
    cursor: pointer;
    transition: transform .05s ease, background .15s ease, border-color .15s ease;
  }
  button:hover { background: #262b36; border-color: #3a4150; }
  button:active { transform: translateY(1px); }
  button.primary {
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    border-color: transparent;
    color: #fff;
  }
  button.primary:hover { filter: brightness(1.06); }

  .options {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    display: flex;
    flex-wrap: wrap;
    gap: 18px 24px;
    color: var(--muted);
    font-size: 13px;
  }
  .options label { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
  .options input[type="radio"], .options input[type="checkbox"], .options input[type="number"] { accent-color: var(--accent); }
  .options input[type="number"] {
    width: 58px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 8px;
    padding: 5px 8px;
    font: inherit;
  }

  .toast {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ok);
    color: #06210f;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  footer { margin-top: 26px; color: var(--muted); font-size: 12px; }
  footer code { color: var(--accent); }

  /* Print: only the label, black on white */
  @media print {
    body { background: #fff; padding: 0; }
    h1, .sub, .controls, .options, footer { display: none !important; }
    .card { border: none; box-shadow: none; max-width: none; padding: 0; }
    .label { padding: 0; }
    .label svg { height: 90px; }
  }
</style>
</head>
<body>
  <h1>POS Barcode Generator</h1>
  <div class="sub">Random code + a real, scannable Code 128 barcode.</div>

  <div class="card">
    <div class="label" id="label">
      <svg id="barcode" viewBox="0 0 100 100" preserveAspectRatio="none" shape-rendering="crispEdges" aria-label="barcode"></svg>
      <div class="code" id="codeText">--------</div>
    </div>

    <div class="controls">
      <button class="primary" id="genBtn">Generate</button>
      <button id="copyBtn">Copy</button>
      <button id="printBtn">Print</button>
    </div>

    <div class="options">
      <span>Length
        <input type="number" id="len" min="4" max="24" value="8">
      </span>
      <label><input type="radio" name="cs" value="alnum" checked> A–Z 0–9</label>
      <label><input type="radio" name="cs" value="digits"> Digits</label>
      <label><input type="radio" name="cs" value="alpha"> Letters</label>
      <label title="Drops I, L and O so a 0 is always zero and a 1 is always one">
        <input type="checkbox" id="noAmbig" checked> No look-alikes
      </label>
    </div>
  </div>

  <footer>Encoded as <code>Code 128-B</code> · print to a label printer or scan off-screen.</footer>

  <div class="toast" id="toast">Copied</div>

<script>
"use strict";

/* ---- Code 128 bar patterns (values 0–106). Each string is 6 element widths,
        alternating bar,space,... starting with a bar (Stop = 7 elements). ---- */
const PATTERNS = ["212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"];
const START_B = 104, STOP = 106;

/* Encode ASCII text (chars 32–126) to a bar/space module string. */
function encode128B(text) {
  const values = [START_B];
  for (const ch of text) values.push(ch.charCodeAt(0) - 32);

  let sum = START_B;
  for (let i = 0; i < text.length; i++) sum += (text.charCodeAt(i) - 32) * (i + 1);
  values.push(sum % 103);   // checksum
  values.push(STOP);

  return values.map(v => PATTERNS[v]).join("");
}

/* Render a module string into the SVG as black bars on transparent (white card). */
function renderBarcode(text) {
  const modules = encode128B(text);
  const quiet = 10;                 // required quiet zone, in modules
  const total = quiet * 2 + [...modules].reduce((a, d) => a + +d, 0);
  const H = 100;

  let x = quiet, isBar = true, rects = "";
  for (const d of modules) {
    const w = +d;
    if (isBar) rects += `<rect x="${x}" y="0" width="${w}" height="${H}" fill="#111"/>`;
    x += w;
    isBar = !isBar;
  }

  const svg = document.getElementById("barcode");
  svg.setAttribute("viewBox", `0 0 ${total} ${H}`);
  svg.innerHTML = rects;
}

/* ---- Random string generation ---- */
const CHARSETS = {
  alnum:  "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",
  digits: "0123456789",
  alpha:  "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
};

/* Ambiguous letters. Dropping I, L and O means a "0" is always zero and a "1"
   is always one — nothing left to mistake them for. Digits stay intact. */
const AMBIGUOUS = "ILO";

function activeCharset() {
  const base = CHARSETS[selectedCharset()] || CHARSETS.alnum;
  if (document.getElementById("noAmbig").checked) {
    return [...base].filter(c => !AMBIGUOUS.includes(c)).join("");
  }
  return base;
}

function randomCode(len, set) {
  const out = new Uint32Array(len);
  crypto.getRandomValues(out);
  let s = "";
  for (let i = 0; i < len; i++) s += set[out[i] % set.length];
  return s;
}

/* ---- Wiring ---- */
let current = "";

function selectedCharset() {
  return document.querySelector('input[name="cs"]:checked').value;
}
function clampedLength() {
  const el = document.getElementById("len");
  let n = parseInt(el.value, 10);
  if (isNaN(n)) n = 8;
  n = Math.max(4, Math.min(24, n));
  el.value = n;
  return n;
}

function generate() {
  current = randomCode(clampedLength(), activeCharset());
  document.getElementById("codeText").textContent = current;
  renderBarcode(current);
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 1400);
}

document.getElementById("genBtn").addEventListener("click", generate);
document.getElementById("printBtn").addEventListener("click", () => window.print());
document.getElementById("copyBtn").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(current);
    toast("Copied " + current);
  } catch {
    toast("Copy failed");
  }
});
document.getElementById("len").addEventListener("change", generate);
document.querySelectorAll('input[name="cs"]').forEach(r => r.addEventListener("change", generate));
document.getElementById("noAmbig").addEventListener("change", generate);
window.addEventListener("keydown", e => {
  if (e.key === " " || e.code === "Space") { e.preventDefault(); generate(); }
});

generate();
</script>
</body>
</html>
